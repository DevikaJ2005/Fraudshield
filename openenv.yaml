name: fraudshield
version: 0.3.0
description: |
  Agentic marketplace fraud investigation environment for OpenEnv.
  Agents can either make a final fraud decision or spend limited investigation
  budget to reveal extra evidence before deciding, with deterministic grading and
  business-cost-sensitive rewards.
author: Devika J
email: devikaj2005@gmail.com

environment:
  class: FraudShieldEnvironment
  module: fraudshield_env

action:
  class: FraudCheckAction
  module: models

observation:
  class: FraudCheckObservation
  module: models

reward:
  class: Reward
  module: models

tasks:
  - name: easy
    description: |
      Low-noise triage cases with strong single-transaction indicators.
      Best agents decide quickly and only investigate when a high-value signal conflicts.
      Difficulty: Foundation level - rewards crisp pattern recognition.
    difficulty: easy
    num_transactions: 24
    baseline_score: 0.9999
  - name: medium
    description: |
      Mixed-signal reviews where confidence calibration and selective investigation matter.
      No single feature is decisive; agents must weigh multiple indicators and limited evidence budget.
      Difficulty: Intermediate - rewards balanced decision-making.
    difficulty: medium
    num_transactions: 36
    baseline_score: 0.9996
  - name: hard
    description: |
      Coordinated fraud rings and legitimate flash-sale edge cases with overlapping signals.
      Complex patterns benefit from network-level analysis and tolerance for ambiguity.
      Difficulty: Advanced - rewards sophisticated multi-step reasoning.
    difficulty: hard
    num_transactions: 48
    baseline_score: 0.9983

metadata:
  created: "2026-03-30"
  framework: openenv
  license: MIT
  tags:
    - openenv
    - fraud-detection
    - e-commerce
    - agent-evaluation
