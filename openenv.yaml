name: fraudshield
version: 0.4.0
description: |
  Enterprise FraudOps environment for OpenEnv. Agents investigate queue cases
  across transaction review, customer profile, merchant profile, network graph,
  and policy tools before resolving or escalating them under SLA pressure.
author: Devika J
email: devikaj2005@gmail.com

environment:
  class: FraudShieldEnvironment
  module: fraudshield_env

action:
  class: FraudCheckAction
  module: models

observation:
  class: FraudCheckObservation
  module: models

reward:
  class: Reward
  module: models

tasks:
  - name: easy
    description: |
      One low-noise case. The agent should open the case, document it, and route it
      correctly without wasting time.
    difficulty: easy
    num_cases: 1
    baseline_score: 0.9900
  - name: medium
    description: |
      One ambiguous case where customer history and policy review are needed before
      the correct routing appears.
    difficulty: medium
    num_cases: 1
    baseline_score: 0.3500
  - name: hard
    description: |
      Two linked fraud cases that require network reasoning, policy-aware escalation,
      and consistent case notes.
    difficulty: hard
    num_cases: 2
    baseline_score: 0.7063

metadata:
  created: "2026-04-23"
  framework: openenv
  license: MIT
  tags:
    - openenv
    - enterprise-workflow
    - fraudops
    - trust-and-safety
    - multi-app
