name: fraudshield
version: 0.2.0
description: OpenEnv environment for marketplace fraud review built from curated Kaggle transactions.
author: Devika J

environment:
  class: FraudShieldEnvironment
  module: fraudshield_env

action:
  class: FraudCheckAction
  module: models

observation:
  class: FraudCheckObservation
  module: models

reward:
  class: Reward
  module: models

tasks:
  - name: easy
    description: Clear-cut fraud reviews with strong single-transaction indicators.
    difficulty: easy
    num_transactions: 24
  - name: medium
    description: Mixed-signal reviews where confidence calibration and tradeoffs matter.
    difficulty: medium
    num_transactions: 36
  - name: hard
    description: Coordinated fraud rings and legitimate flash-sale edge cases with overlapping signals.
    difficulty: hard
    num_transactions: 48

metadata:
  created: "2026-03-30"
  framework: openenv
  license: MIT
  tags:
    - openenv
    - fraud-detection
    - e-commerce
    - agent-evaluation
